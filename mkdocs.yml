site_name: imessage-tui
site_url: https://oovets.github.io/imessage-tui/
# repo button intentionally omitted so the header shows only the site title.

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: green
  font:
    code: JetBrains Mono
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
    - toc.integrate

extra_css:
  - extra.css
  - https://stevoo.net/theme.css
  - https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css

extra_javascript:
  - https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js
  - https://stevoo.net/map.js

nav:
  - readme: index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

extra:
  homepage: /

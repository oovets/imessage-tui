site_name: imessage-tui
site_url: https://oovets.github.io/imessage-tui/
# repo button intentionally omitted so the header shows only the site title.

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: green
  font:
    code: JetBrains Mono
  features:
    - navigation.top
    - navigation.sections
    - content.code.copy
    - toc.integrate

extra_css:
  - extra.css

nav:
  - readme: index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
